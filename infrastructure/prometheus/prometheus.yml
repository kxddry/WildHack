global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "prediction-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["prediction-service:8000"]

  - job_name: "dispatcher-service"
    metrics_path: /metrics
    static_configs:
      - targets: ["dispatcher-service:8001"]
